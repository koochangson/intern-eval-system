<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>채용연계형 인턴 평가시스템 — 로그인</title>
<link rel="stylesheet" href="css/style.css" />
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="loginScreen">
    <div class="card">
      <h2 style="border:none;">채용연계형 인턴 평가시스템</h2>
      <p class="muted-text">Google 계정으로 로그인하면, 사전에 등록된 이메일인지 확인 후<br/>역할(인턴/멘토/현장소장/인사부서)에 맞는 화면으로 이동합니다.</p>
      <div id="googleSignInBtn" style="display:flex;justify-content:center;margin-top:16px;"></div>
      <div id="loginError" class="error"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // 이미 로그인 세션이 있으면 바로 라우팅
    (function () {
      const user = getCachedUser();
      if (user && getIdToken()) routeByRole(user);
    })();

    window.addEventListener('load', function () {
      initGoogleSignIn(function (user) {
        routeByRole(user);
      });
    });

    function routeByRole(user) {
      const map = {
        intern: 'pages/activity-log.html',
        mentor: 'pages/mentor.html',
        manager: 'pages/manager.html',
        hr: 'pages/hr.html'
      };
      window.location.href = map[user.role] || 'pages/activity-log.html';
    }
  </script>
</body>
</html>
